<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share-Work Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3e;
    --accent: #6c8ef0;
    --accent-hover: #8aa4f7;
    --danger: #e05252;
    --success: #4caf8a;
    --warn: #e0a952;
    --muted: #6b7280;
    --text: #e2e4ec;
    --text-dim: #9399a6;
    --radius: 8px;
    --font: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  }

  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.5; min-height: 100vh; }

  /* ── Layout ── */
  header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 16px; font-weight: 700; letter-spacing: .05em; color: var(--accent); }
  .header-right { display: flex; gap: 12px; align-items: center; }

  main { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
  @media (min-width: 900px) { main { grid-template-columns: 1fr 340px; } }

  /* ── Cards ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .card-header h2 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); }
  .card-body { padding: 16px; }

  /* ── Health bar ── */
  #health-bar { grid-column: 1 / -1; }
  .health-grid { display: flex; flex-wrap: wrap; gap: 16px; }
  .health-item { flex: 1; min-width: 140px; }
  .health-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
  .health-val { font-size: 20px; font-weight: 700; }

  /* ── Status badges ── */
  .badge { display: inline-block; padding: 1px 7px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-open     { background: #1e3a5f; color: #60a5fa; }
  .badge-claimed  { background: #3b2f0d; color: #fbbf24; }
  .badge-in_progress { background: #1a3a2f; color: #34d399; }
  .badge-done     { background: #1a2e1a; color: var(--success); }
  .badge-failed   { background: #3a1a1a; color: var(--danger); }
  .badge-cancelled{ background: #252535; color: var(--muted); }
  .badge-idle     { background: #1a2e1a; color: var(--success); }
  .badge-busy     { background: #1e3a5f; color: #60a5fa; }
  .badge-offline  { background: #252535; color: var(--muted); }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.03); }
  .task-id { color: var(--accent); font-size: 11px; cursor: pointer; }
  .task-id:hover { text-decoration: underline; }
  td.truncate { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── Buttons ── */
  btn, .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text); font-family: var(--font); font-size: 12px; cursor: pointer; transition: background .15s, border-color .15s; }
  .btn:hover { background: rgba(255,255,255,.06); border-color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-danger { border-color: var(--danger); color: var(--danger); }
  .btn-danger:hover { background: rgba(224,82,82,.1); }
  .btn-sm { padding: 3px 10px; font-size: 11px; }

  /* ── Filter pills ── */
  .filter-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill { padding: 3px 10px; border-radius: 12px; border: 1px solid var(--border); font-size: 11px; cursor: pointer; transition: background .15s, border-color .15s; color: var(--text-dim); }
  .pill.active { border-color: var(--accent); color: var(--accent); background: rgba(108,142,240,.12); }
  .pill:hover { border-color: var(--accent); }

  /* ── Form ── */
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; }
  textarea, input, select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font); font-size: 12px; padding: 8px 10px; outline: none; transition: border-color .15s; resize: vertical; }
  textarea:focus, input:focus, select:focus { border-color: var(--accent); }
  textarea { min-height: 80px; }

  /* ── Detail modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: min(680px, 95vw); max-height: 85vh; overflow-y: auto; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .modal-header h3 { font-size: 14px; }
  .modal-body { padding: 18px; }
  .close-btn { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; line-height: 1; }
  .close-btn:hover { color: var(--text); }
  pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; overflow-x: auto; font-size: 11px; white-space: pre-wrap; word-break: break-word; }

  /* ── Toast ── */
  #toast { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
  .toast-msg { padding: 10px 16px; border-radius: 6px; font-size: 12px; border-left: 3px solid; animation: slideIn .2s ease; }
  .toast-ok  { background: #1a2e1a; border-color: var(--success); color: #6ee0ae; }
  .toast-err { background: #2e1a1a; border-color: var(--danger); color: #f08080; }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ── Misc ── */
  .empty { text-align: center; padding: 32px; color: var(--muted); }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .refresh-btn { font-size: 14px; }
  .auto-label { font-size: 11px; color: var(--text-dim); }
  .right-col { display: flex; flex-direction: column; gap: 20px; }
  .worker-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .worker-item:last-child { border-bottom: none; }
  .worker-name { font-weight: 600; margin-bottom: 6px; }
  .worker-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; font-size: 11px; color: var(--text-dim); }
  .worker-meta span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .resource-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 6px; }
  .resource-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width .4s; }
</style>
</head>
<body>

<header>
  <h1>⚡ Share-Work Dashboard</h1>
  <div class="header-right">
    <span class="auto-label" id="last-updated">-</span>
    <button class="btn btn-sm refresh-btn" onclick="refreshAll()" title="Refresh">↻</button>
    <button class="btn btn-sm btn-primary" onclick="openSubmitModal()">+ New Task</button>
  </div>
</header>

<main>
  <!-- Health bar -->
  <div class="card" id="health-bar">
    <div class="card-header">
      <h2>System Health</h2>
      <span id="health-status-dot"></span>
    </div>
    <div class="card-body">
      <div class="health-grid" id="health-grid">
        <div class="health-item"><div class="health-label">Status</div><div class="health-val" id="h-status">—</div></div>
        <div class="health-item"><div class="health-label">Worker ID</div><div class="health-val" style="font-size:13px" id="h-worker">—</div></div>
        <div class="health-item"><div class="health-label">Slots Free</div><div class="health-val" id="h-slots">—</div></div>
        <div class="health-item"><div class="health-label">Active Tasks</div><div class="health-val" id="h-active">—</div></div>
        <div class="health-item"><div class="health-label">Local Queued</div><div class="health-val" id="h-queued">—</div></div>
      </div>
    </div>
  </div>

  <!-- Tasks table (left) -->
  <div style="display:flex;flex-direction:column;gap:20px;">
    <div class="card">
      <div class="card-header">
        <h2>Tasks</h2>
        <div class="filter-pills" id="status-filters">
          <span class="pill active" data-status="">All</span>
          <span class="pill" data-status="open">Open</span>
          <span class="pill" data-status="claimed">Claimed</span>
          <span class="pill" data-status="in_progress">In Progress</span>
          <span class="pill" data-status="done">Done</span>
          <span class="pill" data-status="failed">Failed</span>
          <span class="pill" data-status="cancelled">Cancelled</span>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Task ID</th>
              <th>Status</th>
              <th>Priority</th>
              <th>Requested By</th>
              <th>Assigned To</th>
              <th>Created</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="task-tbody">
            <tr><td colspan="7" class="empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Right column -->
  <div class="right-col">
    <!-- Workers -->
    <div class="card">
      <div class="card-header"><h2>Workers</h2></div>
      <div class="card-body" id="workers-list">
        <div class="empty">Loading…</div>
      </div>
    </div>

    <!-- Quick submit -->
    <div class="card">
      <div class="card-header"><h2>Submit Task</h2></div>
      <div class="card-body">
        <form id="quick-form" onsubmit="quickSubmit(event)">
          <div class="form-group">
            <label>Requirement *</label>
            <textarea id="q-req" placeholder="Describe the task…" required></textarea>
          </div>
          <div class="form-group">
            <label>Requested By</label>
            <input id="q-by" type="text" placeholder="http-client">
          </div>
          <div class="form-group">
            <label>Mode</label>
            <select id="q-mode">
              <option value="">Distributed (default)</option>
              <option value="local">Local (immediate)</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%">Submit</button>
        </form>
      </div>
    </div>
  </div>
</main>

<!-- Task detail modal -->
<div class="modal-overlay" id="detail-modal" onclick="closeDetailIfBg(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Task Detail</h3>
      <button class="close-btn" onclick="closeDetail()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Toast container -->
<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let activeFilter = '';
let autoRefreshTimer = null;
const AUTO_REFRESH_MS = 10000;

// ── Init ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  setupFilters();
  refreshAll();
  startAutoRefresh();
});

// ── Auto-refresh ───────────────────────────────────────────────────────────
function startAutoRefresh() {
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  autoRefreshTimer = setInterval(refreshAll, AUTO_REFRESH_MS);
}

async function refreshAll() {
  await Promise.allSettled([loadHealth(), loadTasks(), loadWorkers()]);
  document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

// ── API helpers ────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    ...opts,
  });
  const ct = res.headers.get('content-type') || '';
  const body = ct.includes('application/json') ? await res.json() : await res.text();
  if (!res.ok) throw new Error((body && body.error) || res.statusText);
  return body;
}

// ── Health ─────────────────────────────────────────────────────────────────
async function loadHealth() {
  try {
    const h = await api('/health');
    document.getElementById('h-status').textContent = h.status || '—';
    document.getElementById('h-status').style.color = h.status === 'ok' ? 'var(--success)' : 'var(--danger)';
    document.getElementById('h-worker').textContent = h.worker_id || '—';
    document.getElementById('h-slots').textContent = `${h.slots_free ?? '—'} / ${h.slots_total ?? '—'}`;
    document.getElementById('h-active').textContent = (h.current_tasks || []).length;
    document.getElementById('h-queued').textContent = (h.local_queued || []).length;
  } catch(e) {
    document.getElementById('h-status').textContent = 'error';
    document.getElementById('h-status').style.color = 'var(--danger)';
  }
}

// ── Tasks ──────────────────────────────────────────────────────────────────
async function loadTasks() {
  const url = activeFilter ? `/tasks?status=${activeFilter}` : '/tasks';
  const tbody = document.getElementById('task-tbody');
  try {
    const tasks = await api(url);
    if (!tasks.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty">No tasks found</td></tr>';
      return;
    }
    tbody.innerHTML = tasks.map(t => `
      <tr>
        <td><span class="task-id" onclick="showDetail('${escHtml(t.task_id)}')">${escHtml(t.task_id)}</span></td>
        <td><span class="badge badge-${escHtml(t.status || '')}">${escHtml(t.status || '—')}</span></td>
        <td>${escHtml(t.priority || '—')}</td>
        <td>${escHtml(t.requested_by || '—')}</td>
        <td>${escHtml(t.assigned_to || '—')}</td>
        <td style="white-space:nowrap;font-size:11px">${fmtTime(t.created_at)}</td>
        <td>${canCancel(t.status) ? `<button class="btn btn-danger btn-sm" onclick="cancelTask('${escHtml(t.task_id)}')">Cancel</button>` : ''}</td>
      </tr>
    `).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty" style="color:var(--danger)">Error: ${escHtml(e.message)}</td></tr>`;
  }
}

function canCancel(status) {
  return ['open','claimed','in_progress'].includes(status);
}

async function cancelTask(id) {
  if (!confirm(`Cancel task ${id}?`)) return;
  try {
    await api(`/tasks/${id}`, { method: 'DELETE' });
    toast('Task cancelled: ' + id, 'ok');
    loadTasks();
  } catch(e) {
    toast('Cancel failed: ' + e.message, 'err');
  }
}

// ── Task detail ────────────────────────────────────────────────────────────
async function showDetail(id) {
  const modal = document.getElementById('detail-modal');
  const body = document.getElementById('modal-body');
  document.getElementById('modal-title').textContent = id;
  body.innerHTML = '<div class="empty"><span class="spin">↻</span> Loading…</div>';
  modal.classList.add('open');
  try {
    const t = await api(`/tasks/${id}`);
    body.innerHTML = `<pre>${escHtml(JSON.stringify(t, null, 2))}</pre>`;
  } catch(e) {
    body.innerHTML = `<div style="color:var(--danger)">Error: ${escHtml(e.message)}</div>`;
  }
}

function closeDetail() {
  document.getElementById('detail-modal').classList.remove('open');
}

function closeDetailIfBg(e) {
  if (e.target === document.getElementById('detail-modal')) closeDetail();
}

// ── Workers ────────────────────────────────────────────────────────────────
async function loadWorkers() {
  const el = document.getElementById('workers-list');
  try {
    const workers = await api('/workers');
    if (!workers.length) {
      el.innerHTML = '<div class="empty">No workers registered</div>';
      return;
    }
    el.innerHTML = workers.map(w => {
      const r = w.resources || {};
      const cpuPct = r.cpu_total ? Math.round((1 - (r.cpu_available || 0) / r.cpu_total) * 100) : 0;
      const memPct = r.memory_total ? Math.round((1 - (r.memory_available || 0) / r.memory_total) * 100) : 0;
      return `
        <div class="worker-item">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
            <span class="worker-name">${escHtml(w.worker_id)}</span>
            <span class="badge badge-${escHtml(w.status || 'idle')}">${escHtml(w.status || 'idle')}</span>
          </div>
          <div class="worker-meta">
            <span>Tasks: ${(w.current_tasks || []).length}</span>
            <span>Heartbeat: ${fmtTime(w.last_heartbeat)}</span>
            ${r.cpu_total ? `<span>CPU: ${r.cpu_available || 0}/${r.cpu_total}</span>` : ''}
            ${r.memory_total ? `<span>Mem: ${fmt_mb(r.memory_available)}/${fmt_mb(r.memory_total)}</span>` : ''}
          </div>
          ${r.cpu_total ? `<div class="resource-bar"><div class="resource-fill" style="width:${cpuPct}%"></div></div>` : ''}
        </div>
      `;
    }).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty" style="color:var(--danger)">Error: ${escHtml(e.message)}</div>`;
  }
}

// ── Quick submit ───────────────────────────────────────────────────────────
async function quickSubmit(e) {
  e.preventDefault();
  const req = document.getElementById('q-req').value.trim();
  const by  = document.getElementById('q-by').value.trim() || 'http-client';
  const mode = document.getElementById('q-mode').value || undefined;
  const btn = e.target.querySelector('button[type=submit]');
  btn.disabled = true;
  btn.textContent = 'Submitting…';
  try {
    const res = await api('/tasks', {
      method: 'POST',
      body: JSON.stringify({ requirement: req, by, mode }),
    });
    toast(`Submitted: ${(res.task_ids || []).join(', ')}`, 'ok');
    document.getElementById('q-req').value = '';
    loadTasks();
  } catch(e) {
    toast('Submit failed: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Submit';
  }
}

function openSubmitModal() {
  document.getElementById('q-req').focus();
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

// ── Filters ────────────────────────────────────────────────────────────────
function setupFilters() {
  document.getElementById('status-filters').addEventListener('click', e => {
    const pill = e.target.closest('.pill');
    if (!pill) return;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeFilter = pill.dataset.status;
    loadTasks();
  });
}

// ── Helpers ────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtTime(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    const diff = (Date.now() - d) / 1000;
    if (diff < 60) return `${Math.round(diff)}s ago`;
    if (diff < 3600) return `${Math.round(diff/60)}m ago`;
    if (diff < 86400) return `${Math.round(diff/3600)}h ago`;
    return d.toLocaleDateString();
  } catch { return String(iso); }
}

function fmt_mb(mb) {
  if (!mb) return '0';
  if (mb >= 1024) return (mb/1024).toFixed(1) + 'G';
  return mb + 'M';
}

function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = `toast-msg toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}
</script>
</body>
</html>
