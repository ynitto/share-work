# Unified task server config (HTTP server + Controller + Worker in one process)

server:
  host: "0.0.0.0"
  port: 8080

gitlab:
  repo_path: "."
  remote: "origin"
  branch: "main"

controller:
  interval: 60                          # seconds between each monitoring scan
  decompose_model: "claude-sonnet-4-6"  # model used for task decomposition
  timeouts:
    claim_ttl: 300                      # seconds before claimed task is reopened
    execution_ttl: 3600                 # seconds before in_progress task times out
  cleanup:
    enabled: true
    keep_failed_tasks: true
    artifacts_dir: "./collected_artifacts"

worker:
  id: "worker-node1"                    # unique worker identifier
  interval: 30                          # seconds between task polls
  heartbeat_interval: 60               # seconds between heartbeat pushes
  max_concurrent_tasks: 3
  capabilities:
    - general
    - code-generation
    - documentation
  agent:
    binary: "claude"
    model: "claude-sonnet-4-6"
    timeout: 3600
    sandbox: true
  resources:
    has_gpu: false
    # cpu_total / memory_total / disk_total are auto-detected at runtime
