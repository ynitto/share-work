# Unified task server config (HTTP server + Controller + Worker in one process)

server:
  host: "0.0.0.0"
  port: 8080

gitlab:
  repo_path: "."
  remote: "origin"
  branch: "main"

controller:
  interval: 60                          # seconds between each monitoring scan
  decompose_model: "claude-sonnet-4-6"  # model used for task decomposition
  decompose_binary: "claude"            # CLI binary used for task decomposition (claude only)
  timeouts:
    claim_ttl: 300                      # seconds before claimed task is reopened
    execution_ttl: 3600                 # seconds before in_progress task times out
  cleanup:
    enabled: true
    keep_failed_tasks: true
    artifacts_dir: "./collected_artifacts"

worker:
  id: "worker-node1"                    # unique worker identifier
  interval: 30                          # seconds between task polls
  heartbeat_interval: 60               # seconds between heartbeat pushes
  max_concurrent_tasks: 3
  capabilities:
    - general
    - code-generation
    - documentation
  agent:
    # Agent type: "claude" | "copilot" (GitHub Copilot) | "amazon-q"
    type: "claude"
    # Binary path override (optional; defaults to "claude", "gh", or "q" per type)
    # binary: "claude"
    model: "claude-sonnet-4-6"          # Model name (Claude only)
    timeout: 3600
    sandbox: true                       # Sandbox mode (Claude only)
    # suggestion_type: "shell"          # Copilot only: "shell" | "git" | "gh"
  self_order_delay: 0                   # seconds to wait before claiming own tasks (0 = disabled)
  # owner_ids:                          # requested_by values treated as "self" (worker_id always included)
  #   - alice
  resources:
    has_gpu: false
    # cpu_total / memory_total / disk_total are auto-detected at runtime
